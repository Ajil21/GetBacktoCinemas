<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GetBackToCinemas (GBC)</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🕷️</text></svg>">
    
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --bg: #0b0b0d; --accent: #8a2be2; --glass: rgba(255, 255, 255, 0.05); }
        body { background: var(--bg); color: #fff; font-family: 'Inter', system-ui, -apple-system, sans-serif; margin: 0; overflow-x: hidden; }
        .hidden { display: none !important; }

        /* Navigation */
        .glass-nav { position: fixed; top: 0; width: 100%; z-index: 100; display: flex; justify-content: space-between; padding: 1.2rem 5%; background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent); backdrop-filter: blur(12px); box-sizing: border-box; align-items: center; }
        .logo { font-weight: 800; font-size: 1.5rem; letter-spacing: -1px; }
        .logo span { color: var(--accent); }
        .nav-links { display: flex; list-style: none; gap: 2rem; padding: 0; margin: 0; }
        .nav-links li { cursor: pointer; opacity: 0.7; transition: 0.3s; font-size: 0.9rem; font-weight: 500; }
        .nav-links li:hover { opacity: 1; color: var(--accent); }

        /* Hero Section */
        .hero { height: 85vh; background-size: cover; background-position: center; display: flex; align-items: center; padding: 0 5%; position: relative; transition: background-image 0.5s ease-in-out; }
        .hero::before { content: ''; position: absolute; inset: 0; background: linear-gradient(to right, var(--bg) 20%, transparent 80%), linear-gradient(to top, var(--bg) 0%, transparent 40%); }
        .hero-content { position: relative; z-index: 2; max-width: 650px; }
        
        /* Clickable WebP Logo Styles */
        .hero-logo {
            display: block;
            max-width: 450px; 
            width: 100%;
            margin: 15px 0 20px 0;
            cursor: pointer;
            transition: transform 0.3s ease;
            image-rendering: smooth; 
            filter: drop-shadow(0px 10px 20px rgba(0, 0, 0, 0.8)) drop-shadow(0px 0px 5px rgba(255, 255, 255, 0.1));
        }
        .hero-logo:hover { transform: scale(1.02); }

        .chip { background: var(--accent); padding: 5px 12px; border-radius: 4px; font-size: 0.7rem; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; }
        .hero-desc { opacity: 0.8; line-height: 1.6; margin-bottom: 2rem; font-size: 1.1rem; }

        /* Rows */
        .rows-container { padding: 0 5% 5rem; margin-top: -120px; position: relative; z-index: 5; }
        .row { margin-bottom: 3rem; }
        .row-header h3 { font-size: 1.3rem; margin-bottom: 1.2rem; font-weight: 700; color: #eee; }
        .content-scroll { display: flex; gap: 1.2rem; overflow-x: auto; scrollbar-width: none; padding: 1rem 0; scroll-behavior: smooth; }
        .content-scroll::-webkit-scrollbar { display: none; }

        /* Cards - HARD LOCKED HEIGHT/WIDTH PROPORTIONS */
        .card { 
            flex: 0 0 320px; 
            width: 320px; 
            height: 180px; /* Explicitly locks height to 16:9 ratio, stopping width/height bleeding */
            border-radius: 12px; 
            overflow: hidden; 
            cursor: pointer; 
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); 
            position: relative; 
            background: #151518; 
            border: 1px solid rgba(255,255,255,0.08); 
        }
        .card:hover { transform: translateY(-8px); border-color: var(--accent); box-shadow: 0 15px 30px rgba(0,0,0,0.6), 0 0 15px rgba(138, 43, 226, 0.3); }
        .card img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .card:hover img { transform: scale(1.1); }
        .card-info { position: absolute; bottom: 0; padding: 20px 15px; background: linear-gradient(transparent, rgba(0,0,0,0.95)); width: 100%; font-size: 0.9rem; box-sizing: border-box; }
        
        .btn-primary { background: white; color: black; border: 0; padding: 14px 28px; border-radius: 6px; font-weight: 800; cursor: pointer; transition: 0.3s; display: inline-flex; align-items: center; gap: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
        .btn-primary:hover { background: var(--accent); color: white; transform: scale(1.05); }

        /* Player Modal */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .player-preloader { position: absolute; inset: 0; background: #0b0b0d; z-index: 1001; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        
        .modal-content { 
            width: 75vw; 
            height: 75vh; 
            max-width: none; 
            background: #000;
            box-shadow: 0 0 100px rgba(138, 43, 226, 0.3); 
            border-radius: 12px;
            overflow: hidden; 
            position: relative;
        }
        
        #player-container { width: 100%; height: 100%; }
        #player-container iframe { width: 100%; height: 100%; border: 0; display: block; }
        
        .close-btn { position: absolute; top: 30px; right: 30px; background: rgba(255,255,255,0.1); border: 0; color: #fff; padding: 12px; border-radius: 50%; cursor: pointer; z-index: 1002; display: flex; transition: 0.3s; }
        .close-btn:hover { background: var(--accent); }

        /* Loader Animation */
        .loader-bar { width: 200px; height: 3px; background: #222; margin-top: 20px; border-radius: 10px; overflow: hidden; position: relative; }
        .loader-bar::after { content: ''; position: absolute; left: -100%; width: 100%; height: 100%; background: var(--accent); animation: loading 2s infinite; }
        @keyframes loading { 100% { left: 100%; } }

        /* Mobile Responsiveness Rules */
        @media (max-width: 768px) {
            .glass-nav { padding: 1rem 5%; }
            .logo { font-size: 1.2rem; }
            .nav-links { gap: 1rem; }
            .nav-links li { font-size: 0.8rem; }
            .hero { height: 75vh; }
            .hero-logo { max-width: 260px; margin: 10px 0; }
            .hero-desc { font-size: 0.95rem; line-height: 1.4; margin-bottom: 1.5rem; }
            .btn-primary { padding: 12px 24px; font-size: 0.85rem; }
            .rows-container { margin-top: -60px; padding-bottom: 3rem; }
            .row-header h3 { font-size: 1.1rem; }
            
            /* Explicit Mobile Box Lock */
            .card { flex: 0 0 240px; width: 240px; height: 135px; } 
            .card-info { font-size: 0.8rem; padding: 12px; }
            
            .modal-content { width: 95vw; height: auto; aspect-ratio: 16/9; border-radius: 8px; }
            .close-btn { top: 15px; right: 15px; padding: 8px; }
        }

        @media (max-width: 480px) {
            .nav-links { display: none; } 
            .hero-logo { max-width: 220px; }
            
            /* Explicit Tiny Mobile Box Lock */
            .card { flex: 0 0 200px; width: 200px; height: 112px; }
        }
    </style>
</head>
<body>

    <nav class="glass-nav">
        <div class="logo">GetBackTo<span>Cinemas</span></div>
        <ul class="nav-links">
            <li onclick="location.reload()">Home</li>
            <li>Movies</li>
            <li>Shows</li>
        </ul>
        <div style="display:flex; gap: 20px; opacity: 0.8;">
            <i data-lucide="search" style="cursor:pointer"></i>
            <i data-lucide="user" style="cursor:pointer"></i>
        </div>
    </nav>

    <main id="app-content">
        <header class="hero" id="hero-banner"></header>
        <div class="rows-container" id="rows-container"></div>
    </main>

    <div id="video-modal" class="modal hidden">
        <div class="player-preloader" id="preloader">
            <h2 id="loading-title" style="letter-spacing: 2px;">INITIALIZING THEATER...</h2>
            <p style="opacity: 0.5; font-size: 0.9rem;">GBC Discovery Protocol Active</p>
            <div class="loader-bar"></div>
        </div>
        <div class="modal-content"><div id="player-container"></div></div>
        <button class="close-btn" onclick="closeVideo()"><i data-lucide="x"></i></button>
    </div>

    <script>
    const discoveryCatalog = [
        { 
            id: "P0XN3-n-2Lo", 
            title: "Project Hail Mary", 
            lang: "EN", 
            hero: true, 
            desc: "A lone astronaut must save humanity from an extinction-level threat using nothing but scientific ingenuity.",
            // Unblockable YouTube MaxRes Thumbnail
            img: "https://i.ytimg.com/vi/P0XN3-n-2Lo/maxresdefault.jpg" 
        },
        { 
            id: "rt-2cxAiPJk", 
            title: "Spider-Man: Brand New Day", 
            lang: "EN",
            img: "https://i.ytimg.com/vi/pB2Y8Yr8j5A/hqdefault.jpg" 
        },
        { 
            id: "XNQbH1SDPRk", 
            title: "The Boys: The Final Season", 
            lang: "EN",
            img: "https://i.ytimg.com/vi/M1bhOaLV4FU/hqdefault.jpg" 
        },
        { 
            id: "ZnfUeVeMKjY", 
            title: "Invincible: Season 5", 
            lang: "EN",
            img: "https://4kwallpapers.com/images/walls/thumbs_2t/25170.jpg" 
        },
        { 
            id: "Z-ub5E9yn6o", 
            title: "Vaazha 2", 
            lang: "MAL",
            img: "https://www.keralatv.in/media/2026/01/Vaazha-2-Biopic-of-a-Billion-Bros-640x853.jpg" 
        },
        { 
            id: "cqGjhVJWtEg", 
            title: "Spider-Verse: Beyond the Spiderverse", 
            lang: "EN",
            img: "https://i.ytimg.com/vi/BmznQmEpazo/hqdefault.jpg" 
        },
        { 
            id: "oBZs3E3lgQU", 
            title: "Dune: Prophecy", 
            lang: "EN",
            img: "https://i.ytimg.com/vi/CzVHWNosS2o/hqdefault.jpg" 
        },
        { 
            id: "U1MqJBVn8Rk", 
            title: "Daredevil: Born Again Season 2", 
            lang: "EN",
            img: "https://i.ytimg.com/vi/sBVjIlTjoIk/hqdefault.jpg" 
        }
    ];

    function initUI() {
        const hero = discoveryCatalog.find(i => i.hero);
        const banner = document.getElementById('hero-banner');
        
        banner.style.backgroundImage = `url('${hero.img}')`;
        
        banner.innerHTML = `
            <div class="hero-content">
                <span class="chip">GBC Exclusive</span>
                <img src="jvqIELbZctv3Jqtcc7Ic5of8vY7.webp" alt="Project Hail Mary Logo" class="hero-logo" onclick="playVideo('${hero.id}', '${hero.title}')">
                <p class="hero-desc">${hero.desc}</p>
                <button class="btn-primary" onclick="playVideo('${hero.id}', '${hero.title}')">
                    <i data-lucide="play-circle"></i> WATCH TRAILER
                </button>
            </div>
        `;

        const container = document.getElementById('rows-container');
        const sections = [
            { title: "Upcoming Superhero Cinematic", start: 0, end: 4 },
            { title: "Sci-Fi & Multi-Language Discovery", start: 4, end: 8 }
        ];
        
        sections.forEach(section => {
            const slice = discoveryCatalog.slice(section.start, section.end);
            container.innerHTML += `
                <div class="row">
                    <div class="row-header"><h3>${section.title}</h3></div>
                    <div class="content-scroll">${slice.map(createCard).join('')}</div>
                </div>
            `;
        });
        lucide.createIcons();
    }

    function createCard(item) {
        return `
            <div class="card" onclick="playVideo('${item.id}', '${item.title}')">
                <img src="${item.img}" alt="${item.title}">
                <div class="card-info"><b>[${item.lang}]</b> ${item.title}</div>
            </div>
        `;
    }

    function playVideo(id, title) {
        const modal = document.getElementById('video-modal');
        const preloader = document.getElementById('preloader');
        const container = document.getElementById('player-container');
        
        modal.classList.remove('hidden');
        preloader.classList.remove('hidden');
        document.getElementById('loading-title').innerText = `DECRYPTING: ${title.toUpperCase()}...`;

        setTimeout(() => {
            preloader.classList.add('hidden');
            container.innerHTML = `<iframe width="100%" height="100%" src="https://www.youtube.com/embed/${id}?autoplay=1&rel=0" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
        }, 3000); 
    }

    function closeVideo() {
        document.getElementById('video-modal').classList.add('hidden');
        document.getElementById('player-container').innerHTML = '';
    }

    document.addEventListener('DOMContentLoaded', initUI);
    </script>
</body>
</html>
